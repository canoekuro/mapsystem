# Databricks Apps 設定（SPEC §2 / §3）
#
# 起動エントリは app.py（Streamlit）。Databricks Apps は本ファイルの command を
# 実行する。ポートは Databricks 側が割り当てる環境変数を尊重しつつ既定 8000 に束ねる。
#
# 【Chromium 依存について（SPEC §3, 既知リスク）】
# PNG 合成（lib/png_builder._map_to_png）は selenium + ヘッドレス Chrome を用いる。
# selenium 4 の Selenium Manager が chromedriver を解決するが、Chrome/Chromium の
# ブラウザ本体はランタイムに存在する必要がある。Databricks Apps の標準ランタイムに
# Chromium が含まれない場合、PNG／ZIP（画像）機能は動作しない。
# その場合は以下のいずれかで Chromium 本体を供給すること:
#   - ベースイメージ/ビルド手順で chromium をインストールする
#   - 事前同梱した Chromium バイナリのパスを CHROME_BIN で指定する
# 詳細は README.md の「デプロイ時の留意事項」を参照。

command:
  - streamlit
  - run
  - app.py
  - --server.port
  - "8000"
  - --server.address
  - "0.0.0.0"
  - --server.headless
  - "true"

env:
  # Selenium にヘッドレス用の Chrome バイナリ位置を伝える（環境に応じて調整）。
  - name: CHROME_BIN
    value: "/usr/bin/chromium"
