# Databricks Apps 設定（SPEC §2 / §3）
#
# 起動エントリは app.py（Streamlit）。Databricks Apps はポートを動的割当するため
# DATABRICKS_APP_PORT を使用し、ホストは 0.0.0.0 に束ねる（502 回避）。
# Streamlit の CORS / XSRF はリバースプロキシ構成のため無効化が必須。
#
# 【既知の制約】PNG 合成（lib/png_builder._map_to_png）は selenium + ヘッドレス Chrome に
# 依存する。Databricks Apps は root 権限が無く Chromium を導入できないため、本環境では
# PNG／画像ZIP は動作しない（地図表示・施設リスト・CSV/データZIP・ヘルプは動作）。
# ブラウザレスな PNG 生成への置換を別途計画済み。

# Databricks はコマンドをシェルで実行しないため ${VAR} 展開は不可。ポートはランタイムが
# Streamlit 向けに自動注入する（STREAMLIT_SERVER_PORT=DATABRICKS_APP_PORT）。よって
# --server.port は指定せず、その他の設定は env（リテラル値）で行う。
resources:
  - name: "main-warehouse"
    description: "データ読み込み用 SQL Warehouse"
    sql_warehouse:
      id: "your_warehouse_id_here"
      permission: "CAN_USE"

command:
  - streamlit
  - run
  - app.py

env:
  - name: STREAMLIT_SERVER_ADDRESS
    value: "0.0.0.0"
  - name: STREAMLIT_SERVER_HEADLESS
    value: "true"
  - name: STREAMLIT_SERVER_ENABLE_CORS
    value: "false"
  - name: STREAMLIT_SERVER_ENABLE_XSRF_PROTECTION
    value: "false"
  - name: STREAMLIT_BROWSER_GATHER_USAGE_STATS
    value: "false"
