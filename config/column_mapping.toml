# 列名マッピング設定ファイル
# アプリが期待する列名 -> CSVの実際の列名
# CSVの列名が異なる場合は右辺の値を変更してください
# 注: TOML のキーに日本語（非ASCII）を使うため、左辺は必ず "..." で囲むこと

[columns]
"企業G名称" = "企業G名称"
"企業名称" = "企業名称"
"業態名称" = "業態名称"
# 実テーブルで「店舗コード」→「小売店CD」へ改名されたため右辺を張り替える
# （アプリ内部名は「店舗コード」のまま。issue 202607231113）。
"店舗コード" = "小売店CD"
"店舗名称" = "店舗名称"
"店舗_都道府県" = "店舗_都道府県"
"店舗住所" = "店舗住所"
"店舗lat" = "店舗lat"
"店舗lon" = "店舗lon"
"推進園名称" = "推進園名称"
"推進園区分" = "推進園区分"
"推進園_都道府県" = "推進園_都道府県"
"推進園住所" = "推進園住所"
"推進園lat" = "推進園lat"
"推進園lon" = "推進園lon"
"距離km" = "距離km"
# 出荷実績（3商材 × 当年実績/前年実績/前年比）。issue 202607231113。
"プラズマ計_当年実績（箱数）" = "プラズマ計_当年実績（箱数）"
"プラズマ計_前年実績（箱数）" = "プラズマ計_前年実績（箱数）"
"プラズマ計_前年比" = "プラズマ計_前年比"
"おい免_当年実績（箱数）" = "おい免_当年実績（箱数）"
"おい免_前年実績（箱数）" = "おい免_前年実績（箱数）"
"おい免_前年比" = "おい免_前年比"
"ムテキッズ_当年実績（箱数）" = "ムテキッズ_当年実績（箱数）"
"ムテキッズ_前年実績（箱数）" = "ムテキッズ_前年実績（箱数）"
"ムテキッズ_前年比" = "ムテキッズ_前年比"
