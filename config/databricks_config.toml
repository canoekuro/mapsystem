# Databricks Unity Catalog テーブル設定

[databricks]
# 店舗×推進園の結合テーブル（距離km を持つ）。マップ・施設リストの元データ。
table = "kh_aigrd_databricks_prd_01.default.immune_promo_nursery"

# 小売店マスタテーブル（企業名称/店舗名称/店舗コード/店舗_都道府県 の DISTINCT）。
store_table = "kh_aigrd_databricks_prd_01.default.immune_promo_store"

# データ更新（アップロード）機能の格納先 Volume フォルダ。
[volume]
nursery_dir = "/Volumes/kh_aigrd_databricks_prd_01/default/immune_promo_nursery/data"
store_dir = "/Volumes/kh_aigrd_databricks_prd_01/default/immune_promo_nursery/data"

# 商談用資料 / 店舗POP ダウンロードの PowerPoint テンプレート（issue 202607221128）。
[pptx]
template_dir = "/Volumes/kh_aigrd_databricks_prd_01/default/immune_promo_nursery/pptx_template"
shoudan_template = "to_shoudan.pptx"
pop_template = "to_pop.pptx"

# Databricks にアクセスできないときのフォールバック（リポジトリ同梱）
local_fallback = "images/template.pptx"

# テキストプレースホルダーに入れる定型文（issue 202607221450）。
# {store} が選択中の小売店名称に置換される。商談用資料・店舗POP で共通。
store_caption_format = "{store} 周辺マップ"